<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      width: 220px; 
      padding: 12px; 
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
      margin: 0; 
      background: #f8f9fa; 
    }
    
    button { 
      width: 100%; 
      padding: 10px; 
      margin-bottom: 8px; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 14px; 
      font-weight: 500; 
      transition: background 0.2s;
      /* Align SVG and Text */
      display: flex;
      align-items: center;
      justify-content: space-between;
      text-align: left;
      gap: 8px;
    }

    .btn-icon {
      width: 16px;
      height: 16px;
      padding-left: 4px; 
      padding-right: 4px;
      /* for dark mode later */
      /* filter: invert(100%); */
    }

    .divider { height: 1px; background: #dadce0; margin: 12px 0; }
    
    /* Page Actions */
    #btn-add { background: #1a73e8; color: white; }
    #btn-add:hover { background: #1557b0; }
    
    #btn-view { background: #34a853; color: white; }
    #btn-view:hover { background: #2b8c46; }
    
    #btn-quit { background: #ea4335; color: white; margin-bottom: 0; }
    #btn-quit:hover { background: #c5221f; }
    
    /* Cloud Actions */
    #btn-backup { background: #fbbc04; color: #202124; }
    #btn-backup:hover { background: #f29900; }
    
    #btn-restore { background: #8ab4f8; color: #202124; }
    #btn-restore:hover { background: #669df6; }

    #status-msg {
      font-size: 12px; color: #5f6368; text-align: center; margin-top: 10px; height: 14px; font-weight: 500;
    }
  </style>
</head>
<body>
  <button id="btn-add">
    <img src="../images/add.svg" class="btn-icon" aria-hidden="true" alt="" style="width: 20px; height: 20px; padding-left: 0px; padding-right: 0px;"> 
      Add Notes
  </button>
  
  <button id="btn-view">
    <img src="../images/view.svg" class="btn-icon" aria-hidden="true" alt="" style="width: 18px; height: 18px; padding-left: 2px; padding-right: 2px;">
    View Notes on Page
  </button>
  
  <button id="btn-quit">
    <img src="../images/stop.svg" class="btn-icon" aria-hidden="true" alt="">
    Stop / Hide App
  </button>

  <div class="divider"></div>

  <button id="btn-backup">
    <img src="../images/backup.svg" class="btn-icon" aria-hidden="true" alt="">
    Backup to Drive
  </button>
  
  <button id="btn-restore">
    <img src="../images/restore.svg" class="btn-icon" aria-hidden="true" alt="" style="width: 20px; height: 20px; padding-left: 0px; padding-right: 0px;">
    Sync from Drive
  </button>
  
  <div id="status-msg"></div>

  <script src="popup.js"></script>
</body>
</html>
