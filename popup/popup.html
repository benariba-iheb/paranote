<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 200px; padding: 10px; font-family: sans-serif; margin: 0; background: #f8f9fa; }
    button { 
      width: 100%; padding: 10px; margin-bottom: 8px; 
      border: none; border-radius: 6px; cursor: pointer; 
      font-size: 14px; font-weight: 500; transition: background 0.2s;
    }
    #btn-add { background: #1a73e8; color: white; }
    #btn-add:hover { background: #1557b0; }
    #btn-view { background: #34a853; color: white; }
    #btn-view:hover { background: #2b8c46; }
    #btn-quit { background: #ea4335; color: white; margin-bottom: 0; }
    #btn-quit:hover { background: #c5221f; }
  </style>
</head>
<body>
  <button id="btn-add">📝 Add Notes</button>
  <button id="btn-view">👀 View All Notes</button>
  <button id="btn-quit">🛑 Stop / Quit</button>

  <script src="popup.js"></script>
</body>
</html>
